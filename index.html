<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Native — Leapy AI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:   #3738FD;
      --mint:   #3DD9AC;
      --coral:  #F06B6B;
      --yellow: #F2C84B;
      --dark:   #1D0328;
      --dark2:  #2A0B3A;
      --gray:   #F3F3F3;
      --gray2:  #E8E8EE;
      --text:   #1D0328;
      --muted:  #7B7B99;
      --white:  #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
    }

    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    textarea, input { font-family: inherit; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo-wordmark {
      font-size: 22px;
      font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 10px;
      font-weight: 600;
      color: var(--mint);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .sidebar-nav { flex: 1; padding: 16px 12px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 10px;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2px;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
    .nav-item.active { color: white; background: rgba(55,56,253,0.3); }
    .nav-item.active .nav-dot { background: var(--blue); }

    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      margin-left: auto;
      flex-shrink: 0;
    }

    .sidebar-user {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .user-name { font-size: 12px; font-weight: 700; color: white; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }

    .xp-mini {
      margin-top: 10px;
    }
    .xp-mini-bar {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .xp-mini-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--mint));
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .xp-mini-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      background: white;
      border-bottom: 1px solid var(--gray2);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title { font-size: 16px; font-weight: 800; color: var(--dark); }
    .topbar-sub { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 1px; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--gray);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
    }

    .wa-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #15803D;
    }

    .wa-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; }

    /* PAGE CONTENT */
    .page { padding: 32px; flex: 1; }
    .page.mission-page { padding: 0; display: flex; flex-direction: column; }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* CARDS */
    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--gray2);
    }

    .card-blue {
      background: var(--blue);
      border-radius: 16px;
    }

    .card-dark {
      background: var(--dark);
      border-radius: 16px;
    }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

    /* STAT CARD */
    .stat-card {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--gray2);
      padding: 20px 24px;
    }
    .stat-value { font-size: 28px; font-weight: 900; color: var(--dark); }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 4px; }
    .stat-tag {
      display: inline-block;
      background: rgba(55,56,253,0.08);
      color: var(--blue);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* MISSION CARD */
    .mission-card {
      padding: 16px 20px;
      border-radius: 12px;
      border: 1.5px solid var(--gray2);
      background: white;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: default;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .mission-card.clickable { cursor: pointer; }
    .mission-card.clickable:hover { border-color: var(--blue); box-shadow: 0 4px 16px rgba(55,56,253,0.08); transform: translateY(-1px); }
    .mission-card.active { border-color: var(--blue); background: rgba(55,56,253,0.03); }
    .mission-card.done { border-color: var(--mint); background: rgba(61,217,172,0.04); }
    .mission-card.locked { opacity: 0.55; }

    .mission-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .mission-title { font-size: 14px; font-weight: 700; color: var(--dark); }
    .mission-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .mission-meta { display: flex; gap: 10px; margin-top: 8px; }
    .mission-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gray);
      color: var(--muted);
    }
    .mission-xp { color: var(--blue); background: rgba(55,56,253,0.08); }

    /* PHASE CARD */
    .phase-card {
      background: white;
      border-radius: 16px;
      border: 1.5px solid var(--gray2);
      padding: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .phase-card:hover { border-color: var(--blue); box-shadow: 0 4px 20px rgba(55,56,253,0.08); transform: translateY(-2px); }
    .phase-card.active-phase { border-color: var(--blue); }
    .phase-card.done-phase { border-color: var(--mint); }
    .phase-card.locked-phase { opacity: 0.5; cursor: default; }
    .phase-card.locked-phase:hover { transform: none; box-shadow: none; border-color: var(--gray2); }

    /* BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-blue { background: rgba(55,56,253,0.1); color: var(--blue); }
    .badge-mint { background: rgba(61,217,172,0.12); color: #0E9F78; }
    .badge-gray { background: var(--gray); color: var(--muted); }
    .badge-yellow { background: rgba(242,200,75,0.15); color: #9A7A00; }
    .badge-coral { background: rgba(240,107,107,0.1); color: #C0392B; }

    /* PROGRESS BAR */
    .prog-bar {
      height: 6px;
      background: var(--gray2);
      border-radius: 8px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--blue), var(--mint));
      transition: width 0.5s ease;
    }

    /* BUTTON */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.15s;
      cursor: pointer;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: #2625E0; }
    .btn-ghost { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }
    .btn-ghost:hover { background: rgba(55,56,253,0.06); }
    .btn-full { width: 100%; }
    .btn-lg { padding: 16px 28px; font-size: 15px; border-radius: 12px; }
    .btn-disabled { background: var(--gray2); color: var(--muted); cursor: not-allowed; }

    /* HERO BANNER */
    .hero-banner {
      background: var(--blue);
      border-radius: 20px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .hero-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,0.06);
    }
    .hero-banner::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,0.04);
    }

    /* RANKING TABLE */
    .rank-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-radius: 10px;
      transition: background 0.1s;
    }
    .rank-row:hover { background: var(--gray); }
    .rank-row.me { background: rgba(55,56,253,0.05); }

    /* JOURNEY TIMELINE */
    .timeline { position: relative; }
    .timeline-connector {
      width: 2px;
      background: var(--gray2);
      margin: 0 auto;
      height: 20px;
    }
    .timeline-connector.active { background: var(--blue); }

    /* MISSION FULL PAGE */
    .mission-header {
      background: var(--dark);
      padding: 32px;
      color: white;
    }
    .mission-body { padding: 32px; flex: 1; }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.25s ease forwards; }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9); }
      70% { transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }
    .pop-in { animation: popIn 0.35s ease forwards; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .pulse { animation: pulseDot 2s ease-in-out infinite; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--gray2); margin: 20px 0; }

    /* GAP UTILS */
    .gap-4 { gap: 4px; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .gap-24 { gap: 24px; }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .flex-1 { flex: 1; }
    .flex-shrink-0 { flex-shrink: 0; }

    .mb-4 { margin-bottom: 4px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .mb-32 { margin-bottom: 32px; }
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }

    .p-20 { padding: 20px; }
    .p-24 { padding: 24px; }
    .p-28 { padding: 28px; }
    .p-32 { padding: 32px; }

    .text-white { color: white; }
    .text-muted { color: var(--muted); }
    .text-blue { color: var(--blue); }
    .text-mint { color: var(--mint); }
    .text-dark { color: var(--dark); }

    .fw-700 { font-weight: 700; }
    .fw-800 { font-weight: 800; }
    .fw-900 { font-weight: 900; }

    .fs-11 { font-size: 11px; }
    .fs-12 { font-size: 12px; }
    .fs-13 { font-size: 13px; }
    .fs-14 { font-size: 14px; }
    .fs-18 { font-size: 18px; }
    .fs-20 { font-size: 20px; }
    .fs-24 { font-size: 24px; }

    .rounded-12 { border-radius: 12px; }
    .rounded-16 { border-radius: 16px; }

    .w-full { width: 100%; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark);
    }
    .login-box {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-input {
      width: 100%;
      border: 1.5px solid var(--gray2);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      outline: none;
      transition: border 0.15s;
      margin: 20px 0 12px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.5; cursor: default; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray2); border-radius: 4px; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .sidebar { width: 64px; }
      .sidebar-logo .logo-wordmark { display: none; }
      .sidebar-logo .logo-sub { display: none; }
      .nav-item span { display: none; }
      .sidebar-user .user-name { display: none; }
      .sidebar-user .user-role { display: none; }
      .sidebar-user .xp-mini { display: none; }
      .main { margin-left: 64px; }
      .page { padding: 20px; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

            {/* Stats */}
            <div className="card p-24">
              <div className="section-label">Seus números</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {[
                  { v: 1, l: 'missões concluídas', c: COLORS.blue },
                  { v: `${user.streak}`, l: 'dias seguidos 🔥', c: COLORS.coral },
                  { v: user.xp, l: 'XP acumulado', c: COLORS.blue },
                  { v: '#3', l: 'no ranking', c: COLORS.mint },
                ].map((s, i) => (
                  <div key={i} style={{ background: '#F8F8FC', borderRadius: 12, padding: '16px 18px' }}>
                    <div style={{ fontSize: 26, fontWeight: 900, color: s.c }}>{s.v}</div>
                    <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 600, marginTop: 4 }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Right */}
          <div>
            {/* Badges */}
            <div className="card p-24" style={{ marginBottom: 16 }}>
              <div className="section-label">Conquistas</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
                {badges.map((b, i) => (
                  <div key={i} style={{
                    border: `1.5px solid ${b.earned ? COLORS.blue : '#E8E8EE'}`,
                    background: b.earned ? 'rgba(55,56,253,0.05)' : '#F8F8FC',
                    borderRadius: 12, padding: '14px 10px', textAlign: 'center',
                    opacity: b.earned ? 1 : 0.5,
                  }}>
                    <div style={{ fontSize: 24, marginBottom: 6 }}>{b.icon}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: b.earned ? COLORS.dark : COLORS.muted, marginBottom: 3 }}>{b.name}</div>
                    <div style={{ fontSize: 10, color: COLORS.muted }}>{b.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Certificate */}
            <div style={{
              background: `linear-gradient(135deg, ${COLORS.dark}, #2D0A5A)`,
              borderRadius: 20, padding: '28px 32px',
            }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>🎓</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: 'white', marginBottom: 6 }}>Certificado AI Native</div>
              <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', lineHeight: 1.7, marginBottom: 20 }}>
                Conclua todas as 5 fases da Jornada Native para receber seu certificado oficial Leapy — AI Native.
              </p>
              <div style={{ height: 6, background: 'rgba(255,255,255,0.1)', borderRadius: 4, overflow: 'hidden', marginBottom: 8 }}>
                <div style={{ width: '8%', height: '100%', background: `linear-gradient(90deg, ${COLORS.blue}, ${COLORS.mint})`, borderRadius: 4 }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', fontWeight: 600 }}>8% completo</span>
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', fontWeight: 600 }}>Fase 1 de 5</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── LOGIN SCREEN ─────────────────────────────────────────────────

const LoginScreen = ({ onLogin }) => {
  const [phone, setPhone] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const normalizePhone = (p) => {
    let n = p.replace(/\D/g, '');
    if (!n.startsWith('55')) n = '55' + n;
    return n;
  };

  const handleLogin = async () => {
    const normalized = normalizePhone(phone);
    if (normalized.length < 10) { setError('Digite um número válido com DDD.'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch(`${API_BASE}/api/user/${normalized}`);
      if (!res.ok) throw new Error('Usuário não encontrado');
      const data = await res.json();
      if (!data.nome) throw new Error('Conclua o onboarding no WhatsApp primeiro.');
      localStorage.setItem('native_phone', normalized);
      onLogin(normalized, data);
    } catch (e) {
      setError(e.message || 'Erro ao conectar. Tente novamente.');
    }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div style={{ fontSize: 40, marginBottom: 12 }}>🤖</div>
        <div style={{ fontSize: 22, fontWeight: 900, color: COLORS.dark, marginBottom: 6 }}>Native by Leapy</div>
        <div style={{ fontSize: 13, color: COLORS.muted, fontWeight: 500, lineHeight: 1.6 }}>
          Digite o número que você usa no WhatsApp com a Léa para acessar seu progresso.
        </div>
        <input
          className="login-input"
          type="tel"
          placeholder="(11) 99999-9999"
          value={phone}
          onChange={e => setPhone(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleLogin()}
        />
        {error && <div style={{ fontSize: 12, color: COLORS.coral, marginBottom: 10, fontWeight: 600 }}>{error}</div>}
        <button className="login-btn" onClick={handleLogin} disabled={loading}>
          {loading ? 'Carregando...' : 'Acessar minha jornada →'}
        </button>
        <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 16 }}>
          Ainda não começou? Mande <strong>oi</strong> para a Léa no WhatsApp primeiro.
        </div>
      </div>
    </div>
  );
};

// ── APP ──────────────────────────────────────────────────────────

const App = () => {
  const [screen, setScreen] = useState('home');
  const [phase, setPhase] = useState(null);
  const [mission, setMission] = useState(null);
  const [loggedIn, setLoggedIn] = useState(false);
  const [tick, setTick] = useState(0);

  const applyUserData = (data) => {
    const nome = data.nome || 'Usuário';
    const initials = nome.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
    user.name = nome;
    user.initials = initials;
    user.xp = data.xp_total || 0;
    user.xpMax = Math.max(500, Math.ceil((data.xp_total || 0) / 500) * 500);
    user.level = Math.floor((data.xp_total || 0) / 500) + 1;
    user.streak = data.streak || 0;
    user.fase = data.fase_atual || 1;
    user.missoes_completas = data.missoes_completas || 0;
    user.total_missoes = data.total_missoes || 15;
    user.badges_earned = data.badges || [];
    setTick(t => t + 1);
  };

  const fetchAndRefresh = async (phone) => {
    try {
      const [uRes, rRes] = await Promise.all([
        fetch(`${API_BASE}/api/user/${phone}`),
        fetch(`${API_BASE}/api/ranking`),
      ]);
      if (uRes.ok) { const d = await uRes.json(); applyUserData(d); }
      if (rRes.ok) {
        const rData = await rRes.json();
        const savedPhone = localStorage.getItem('native_phone');
        ranking.length = 0;
        rData.forEach((u, i) => ranking.push({
          pos: i + 1,
          name: u.nome,
          initials: u.nome.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase(),
          xp: u.xp_total,
          company: u.phone === savedPhone ? 'Você' : '—',
          phase: u.fase,
          isUser: u.phone === savedPhone,
        }));
        setTick(t => t + 1);
      }
    } catch(e) {}
  };

  useEffect(() => {
    const saved = localStorage.getItem('native_phone');
    if (saved) {
      fetch(`${API_BASE}/api/user/${saved}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && d.nome) { applyUserData(d); setLoggedIn(true); fetchAndRefresh(saved); } })
        .catch(() => {});
    }
  }, []);

  const handleLogin = (phone, data) => {
    applyUserData(data);
    setLoggedIn(true);
    fetchAndRefresh(phone);
  };

  const handleSetScreen = (s) => {
    setScreen(s);
    window.scrollTo(0, 0);
  };

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} />;

  const content = {
    home: <HomeScreen setScreen={handleSetScreen} setPhase={setPhase} setMission={setMission} />,
    journey: <JourneyScreen setScreen={handleSetScreen} setPhase={setPhase} />,
    phase: phase ? <PhaseScreen phase={phase} setScreen={handleSetScreen} setMission={setMission} /> : null,
    mission: mission ? <MissionScreen mission={mission} setScreen={handleSetScreen} /> : null,
    ranking: <RankingScreen />,
    profile: <ProfileScreen />,
  };

  const navScreen = ['home', 'journey', 'ranking', 'profile'].includes(screen) ? screen :
    screen === 'phase' ? 'journey' : 'home';

  return (
    <div className="app" key={tick}>
      <Sidebar screen={navScreen} setScreen={handleSetScreen} />
      <main className="main">
        {content[screen]}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
